name: sync-xposed-repo

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync (e.g. v1.4.0)
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download APK from source release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.tag }}" \
            --repo Kwensiu/DPIS \
            --pattern "*.apk" \
            --dir ./assets

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          if [[ -z "$VERSION" ]]; then
            echo "Tag '$TAG' must include semantic version x.y.z"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          APK_FILE="$(ls ./assets/*.apk | head -n 1)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "xposed_tag=${VERSION_CODE}-${VERSION}" >> "$GITHUB_OUTPUT"
          echo "apk_file=$APK_FILE" >> "$GITHUB_OUTPUT"

      - name: Fetch release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          NOTES=$(gh release view "${{ inputs.tag }}" \
            --repo Kwensiu/DPIS \
            --json body -q .body 2>/dev/null || echo "Release ${{ steps.meta.outputs.version }}")
          echo "$NOTES" > /tmp/release-notes.md

      - name: Publish release to Xposed-Modules-Repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.xposed_tag }}" \
            --repo Xposed-Modules-Repo/io.github.kwensiu.dpis \
            --title "${{ steps.meta.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            "${{ steps.meta.outputs.apk_file }}"
