name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_filter:
        description: Optional Gradle --tests filter (e.g. com.dpis.module.*Hook*Test)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          (yes || true) | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.1.0"

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Build and verify
        shell: bash
        env:
          TEST_FILTER: ${{ github.event.inputs.test_filter }}
        run: |
          if [[ -n "${TEST_FILTER}" ]]; then
            ./gradlew :app:assembleDebug :app:testDebugUnitTest --tests "${TEST_FILTER}" :app:lintDebug --stacktrace
          else
            ./gradlew :app:assembleDebug :app:testDebugUnitTest :app:lintDebug --stacktrace
          fi

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/test-results/testDebugUnitTest
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
