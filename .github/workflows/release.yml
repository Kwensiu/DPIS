name: release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          (yes || true) | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.1.0" "cmake;3.22.1" "ndk;28.2.13676358"

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Validate release signing secrets
        shell: bash
        env:
          DPIS_RELEASE_KEYSTORE_BASE64: ${{ secrets.DPIS_RELEASE_KEYSTORE_BASE64 }}
          DPIS_RELEASE_STORE_PASSWORD: ${{ secrets.DPIS_RELEASE_STORE_PASSWORD }}
          DPIS_RELEASE_KEY_ALIAS: ${{ secrets.DPIS_RELEASE_KEY_ALIAS }}
          DPIS_RELEASE_KEY_PASSWORD: ${{ secrets.DPIS_RELEASE_KEY_PASSWORD }}
        run: |
          for key in \
            DPIS_RELEASE_KEYSTORE_BASE64 \
            DPIS_RELEASE_STORE_PASSWORD \
            DPIS_RELEASE_KEY_ALIAS \
            DPIS_RELEASE_KEY_PASSWORD; do
            if [[ -z "${!key}" ]]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

      - name: Prepare release keystore
        shell: bash
        env:
          DPIS_RELEASE_KEYSTORE_BASE64: ${{ secrets.DPIS_RELEASE_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_DIR="${GITHUB_WORKSPACE}/.keystore"
          KEYSTORE_PATH="${KEYSTORE_DIR}/release.jks"
          mkdir -p "${KEYSTORE_DIR}"
          echo "${DPIS_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"

      - name: Build release APK
        env:
          DPIS_RELEASE_STORE_FILE: ${{ github.workspace }}/.keystore/release.jks
          DPIS_RELEASE_STORE_PASSWORD: ${{ secrets.DPIS_RELEASE_STORE_PASSWORD }}
          DPIS_RELEASE_KEY_ALIAS: ${{ secrets.DPIS_RELEASE_KEY_ALIAS }}
          DPIS_RELEASE_KEY_PASSWORD: ${{ secrets.DPIS_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            echo "Tag is required"
            exit 1
          fi

          VERSION="$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          if [[ -z "$VERSION" ]]; then
            echo "Tag '$TAG' must include semantic version x.y.z"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          REPO="${{ github.repository }}"
          APK_NAME="DPIS_${VERSION}.apk"
          APK_PATH="app/build/outputs/apk/release/${APK_NAME}"
          if [[ ! -f "$APK_PATH" ]]; then
            SOURCE_APK_PATH="app/build/outputs/apk/release/app-release.apk"
            if [[ ! -f "$SOURCE_APK_PATH" ]]; then
              echo "APK not found: $APK_PATH or $SOURCE_APK_PATH"
              exit 1
            fi
            cp "$SOURCE_APK_PATH" "$APK_PATH"
          fi
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/${APK_NAME}"
          MANIFEST_URL="https://github.com/${REPO}/releases/latest/download/update.json"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "manifest_url=$MANIFEST_URL" >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"

      - name: Calculate APK SHA256
        id: hash
        shell: bash
        run: |
          APK_PATH="${{ steps.meta.outputs.apk_path }}"
          SHA256="$(sha256sum "$APK_PATH" | awk '{print $1}')"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Generate update manifest
        shell: bash
        run: |
          cat > update.json <<EOF
          {
            "version": "${{ steps.meta.outputs.version }}",
            "versionCode": ${{ steps.meta.outputs.version_code }},
            "apkUrl": "${{ steps.meta.outputs.apk_url }}",
            "manifestUrl": "${{ steps.meta.outputs.manifest_url }}",
            "releasePage": "${{ steps.meta.outputs.release_url }}",
            "sha256": "${{ steps.hash.outputs.sha256 }}",
            "publishedAt": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "force": false
          }
          EOF
          cat update.json

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "${{ steps.meta.outputs.apk_path }}" \
            update.json \
            --clobber

      - name: Fetch release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          NOTES=$(gh release view "${{ steps.meta.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --json body -q .body 2>/dev/null || echo "Release ${{ steps.meta.outputs.version }}")
          echo "$NOTES" > /tmp/release-notes.md

      - name: Publish release to Xposed-Modules-Repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "XPOSED_REPO_TOKEN not set, skipping sync"
            exit 0
          fi

          gh release create "${{ steps.meta.outputs.version_code }}-${{ steps.meta.outputs.version }}" \
            --repo Xposed-Modules-Repo/io.github.kwensiu.dpis \
            --title "${{ steps.meta.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            "${{ steps.meta.outputs.apk_path }}"
